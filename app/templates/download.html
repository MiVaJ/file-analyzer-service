{% extends "base.html" %} {% block title %} Скачивание файлов {% endblock %}
{%block content %}

<h2>Скачивание данных</h2>

<button id="start-download">Скачать данные</button>

<div class="progress">
  <p>
    Статус:
    <span id="status"> - </span>
  </p>

  <p>
    Получено названий:
    <span id="received"> 0 </span>
  </p>

  <p>
    Скачано:
    <span id="downloaded"> 0 </span>
  </p>
</div>

<script src="{{ url_for('static', path='js/download.js') }}"></script>

{% endblock %}
