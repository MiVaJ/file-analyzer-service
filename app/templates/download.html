{% extends "base.html" %} {% block title %} Скачивание файлов {% endblock %} {%
block content %}

<h2 class="page-title">Скачивание каталога</h2>

<div class="card">
  <p class="info-text">
    Нажмите кнопку, чтобы начать скачивание полного каталога файлов.
  </p>

  <button id="start-download">Скачать данные</button>
</div>

<div class="card">
  <div class="progress">
    <div class="progress-item">
      <span class="progress-label"> Статус </span>

      <span id="status" class="progress-value"> - </span>
    </div>

    <div class="progress-item">
      <span class="progress-label"> Время запуска (НСК) </span>

      <span id="started-at" class="progress-value"> - </span>
    </div>

    <div class="progress-item">
      <span class="progress-label"> Получено названий файлов </span>

      <span id="received" class="progress-value"> 0 </span>
    </div>

    <div class="progress-item">
      <span class="progress-label"> Скачано файлов </span>

      <span id="downloaded" class="progress-value"> 0 </span>
    </div>
  </div>
</div>

<script src="{{ url_for('static', path='js/download.js') }}"></script>

{% endblock %}
